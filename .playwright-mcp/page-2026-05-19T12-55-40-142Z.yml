              - text: What are the basic eligibility criteria for appearing in the CLAT exam?
            - generic [ref=e304]: пҠӮ
          - paragraph [ref=e305]: For CLAT UG (undergraduate), candidates must have completed or be appearing for their 10+2 examination with a minimum of 45% marks (40% for SC/ST/OBC/PWD categories). For CLAT PG (postgraduate), candidates must have completed or be in the final year of their LLB degree with at least 50% marks (45% for reserved categories).

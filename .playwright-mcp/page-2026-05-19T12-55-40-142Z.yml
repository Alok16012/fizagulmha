              - text: What exactly is the CLAT exam and why is it important for law aspirants?
            - generic [ref=e298]: пҠӮ
          - paragraph [ref=e299]: "The Common Law Admission Test (CLAT) is the unified national entrance examination for admissions to 22+ National Law Universities (NLUs) across India. It serves as the gateway to India's premier legal education institutions, testing candidates on five key areas: English Language, Current Affairs, Legal Reasoning, Logical Reasoning, and Quantitative Techniques."
        - generic [ref=e300]:
          - button "п”… What are the basic eligibility criteria for appearing in the CLAT exam? пҠӮ" [ref=e301] [cursor=pointer]:
            - generic [ref=e302]:
